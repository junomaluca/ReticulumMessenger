name: ReticulumMessenger
options:
  bundleIdPrefix: com.reticulummessenger
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: "Automatic"
    DEVELOPMENT_TEAM: "JKHHB9ZUN4"

packages:
  ReticulumKit:
    path: Packages/ReticulumKit

targets:
  ReticulumMessenger:
    type: application
    platform: iOS
    sources:
      - ReticulumMessenger
    dependencies:
      - package: ReticulumKit
        product: ReticulumKit
      - package: ReticulumKit
        product: LXMFKit
      - framework: Frameworks/RetichatFFI.xcframework
        embed: true
      - sdk: IOKit.framework
      - sdk: CoreBluetooth.framework
    settings:
      base:
        INFOPLIST_FILE: ReticulumMessenger/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.reticulummessenger.app
        MARKETING_VERSION: "0.3.0"
        CURRENT_PROJECT_VERSION: 1
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "Automatic"
        SWIFT_OBJC_BRIDGING_HEADER: ReticulumMessenger/ReticulumMessenger-Bridging-Header.h

  ReticulumMessengerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - ReticulumMessengerTests
    dependencies:
      - target: ReticulumMessenger
