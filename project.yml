name: ReticulumMessenger
options:
  bundleIdPrefix: com.reticulummessenger
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"

packages:
  ReticulumKit:
    path: Packages/ReticulumKit

targets:
  ReticulumMessenger:
    type: application
    platform: iOS
    sources:
      - ReticulumMessenger
    dependencies:
      - package: ReticulumKit
        product: ReticulumKit
      - package: ReticulumKit
        product: LXMFKit
    settings:
      base:
        INFOPLIST_FILE: ReticulumMessenger/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.reticulummessenger.app
        MARKETING_VERSION: "0.2.0"
        CURRENT_PROJECT_VERSION: 1
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  ReticulumMessengerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - ReticulumMessengerTests
    dependencies:
      - target: ReticulumMessenger
